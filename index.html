
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Open Flow Dashboard</title>
<style>
body { font-family: Arial; background:#0f172a; color:white; padding:40px; }
.card { background:#1e293b; padding:20px; border-radius:10px; margin-bottom:20px; }
.green { color:#22c55e; }
.red { color:#ef4444; }
</style>
</head>

<body>

<h1>📊 Open Flow Performance Dashboard</h1>

<div class="card">
<h2>Version</h2>
<p id="version"></p>
<p id="updated"></p>
</div>

<div class="card">
<h2>Last Session</h2>
<p id="date"></p>
<p id="decision"></p>
<p id="mae"></p>
<p id="mfe"></p>
</div>

<script>
fetch('data.json')
.then(response => response.json())
.then(data => {

document.getElementById('version').innerText = "Version: " + data.currentVersion;
document.getElementById('updated').innerText = "Last Updated: " + data.lastUpdated;

let last = data.sessions[data.sessions.length - 1];

document.getElementById('date').innerText = "Date: " + last.date;
document.getElementById('decision').innerHTML =
"Decision: <span class='" +
(last.decision === "LONG" ? "green" : "red") +
"'>" + last.decision + "</span>";

document.getElementById('mae').innerText = "MAE 5m: " + last.mae5m + " pts";
document.getElementById('mfe').innerText = "MFE 10m: " + last.mfe10m + " pts";

});
</script>

</body>
</html>
